<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JLPT N2 단어장</title>
    <style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{color-scheme:dark;}
button{-webkit-appearance:none;appearance:none;}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#22223a;
  --accent:#7c6af7;--accent2:#a89cf7;
  --text:#e8e8f0;--text2:#9090b0;--text3:#4a4a6a;
  --n5:#4ade80;--n4:#60a5fa;--n3:#f59e0b;--n2:#f87171;
  --border:rgba(124,106,247,0.15);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;min-height:100vh;min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s ease;will-change:transform;}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}

/* ── HOME ── */
#home-screen{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(28px + var(--safe-bottom));}
.home-header{padding:calc(var(--safe-top) + 22px) 20px 18px;background:var(--surface);border-bottom:1px solid var(--border);}
.home-title{font-size:26px;font-weight:800;letter-spacing:-.8px;}
.home-title span{color:var(--accent2);}
.home-subtitle{font-size:13px;color:var(--text2);margin-top:4px;}

.level-section{padding:16px 20px 0;}
.section-label{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.level-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.level-pills::-webkit-scrollbar{display:none;}
.level-pill{flex-shrink:0;padding:8px 18px;border-radius:30px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid transparent;background:var(--surface2);color:var(--text2);transition:all .18s;}
.level-pill:active{transform:scale(.95);}
.level-pill.active-ALL{background:var(--accent);color:#fff;border-color:var(--accent);}
.level-pill.active-N5{background:rgba(74,222,128,.15);color:var(--n5);border-color:var(--n5);}
.level-pill.active-N4{background:rgba(96,165,250,.15);color:var(--n4);border-color:var(--n4);}
.level-pill.active-N3{background:rgba(245,158,11,.15);color:var(--n3);border-color:var(--n3);}
.level-pill.active-N2{background:rgba(248,113,113,.15);color:var(--n2);border-color:var(--n2);}

.stats-card{margin:14px 20px 0;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:18px;}
.stats-row{display:flex;justify-content:space-between;margin-bottom:12px;}
.stat-item{text-align:center;}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;}
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex;}
.prog-know{background:var(--n5);transition:width .5s ease;}
.prog-vague{background:var(--n3);transition:width .5s ease;}
.prog-dunno{background:var(--n2);transition:width .5s ease;}

.mode-section{padding:16px 20px 0;}
.mode-list{display:flex;flex-direction:column;gap:10px;}
.mode-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:18px;cursor:pointer;transition:all .18s;}
.mode-card:active{transform:scale(.98);background:var(--surface2);}
.mode-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:var(--surface2);line-height:1;text-align:center;padding-bottom:2px;}





.mode-info{flex:1;min-width:0;}
.mode-name{font-size:15px;font-weight:700;letter-spacing:-.2px;}
.mode-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.mode-count{font-size:20px;font-weight:800;color:var(--text2);flex-shrink:0;}
.mode-arrow{font-size:20px;color:var(--text3);flex-shrink:0;margin-left:2px;}

.quick-actions{padding:14px 20px 0;}
.quick-row{display:flex;gap:10px;}
.quick-btn{flex:1;padding:14px 12px;border-radius:16px;font-size:14px;font-weight:800;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .18s;}
.quick-btn:active{transform:scale(.98);background:var(--surface2);}
.quick-btn.danger{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.08);color:#f87171;}
.quick-btn.danger:active{background:rgba(248,113,113,.15);}


/* ── STUDY HEADER ── */
.study-header{padding:calc(var(--safe-top) + 14px) 20px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back-btn{display:flex;align-items:center;justify-content:center;font-size:30px;line-height:1;color:var(--accent2);cursor:pointer;padding:10px 16px 10px 6px;min-width:48px;min-height:48px;background:none;border:none;font-weight:600;touch-action:manipulation;-webkit-touch-callout:none;}
.back-btn:active{opacity:.7;}
.study-header-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-.3px;}
.study-header-sub{font-size:13px;color:var(--text2);}

/* ── FLASHCARD SCREEN ── */
#flash-screen{background:var(--bg);}
.flash-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 20px 0;gap:12px;overflow:hidden;min-height:0;}
.card-counter{font-size:13px;color:var(--text2);font-weight:600;}
.flashcard-wrap{perspective:1200px;width:100%;max-width:440px;height:250px;cursor:pointer;flex-shrink:0;touch-action:manipulation;-webkit-touch-callout:none;}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);-webkit-transition:-webkit-transform .5s cubic-bezier(.4,0,.2,1);}
.flashcard.no-flip-anim,.flashcard.no-flip-anim * {transition:none !important;-webkit-transition:none !important;}
.flashcard.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 20px;border:1px solid var(--border);}
.card-front{background:var(--surface);box-shadow:0 10px 40px rgba(124,106,247,.15);transform:rotateY(0deg) translateZ(1px);-webkit-transform:rotateY(0deg) translateZ(1px);}
.card-back{background:var(--surface2);transform:rotateY(180deg) translateZ(1px);-webkit-transform:rotateY(180deg) translateZ(1px);box-shadow:0 10px 40px rgba(124,106,247,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;overflow:hidden;}
.card-lv-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.card-kanji{font-size:88px;line-height:1.1;font-weight:300;width:100%;text-align:center;word-break:keep-all;white-space:nowrap;display:flex;align-items:center;justify-content:center;transition:font-size 0.2s;}
.card-hint{font-size:13px;color:var(--text2);}
.card-back-kanji{font-size:50px;line-height:1;font-weight:300;}
.card-desc{font-size:20px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.card-meta{font-size:12px;color:var(--text2);}
.flash-footer{padding:10px 20px calc(10px + var(--safe-bottom));display:flex;flex-direction:column;gap:10px;flex-shrink:0;background:var(--bg);position:relative;z-index:9999;border-top:1px solid var(--border);}
.nav-btns{display:flex;gap:10px;}
.nav-btn{flex:1;padding:12px 0;border-radius:12px;font-size:15px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;}
.nav-btn:active{transform:scale(.96);background:var(--surface2);}
.rate-btns{display:flex;gap:8px;position:relative;z-index:110;}
.rate-btn{flex:1;padding:16px 4px;border-radius:14px;font-size:14px;font-weight:700;border:1px solid;cursor:pointer;text-align:center;transition:all .15s;white-space:nowrap;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.rate-btn:active{transform:scale(.92); background:var(--surface2); opacity: 0.8;}
.btn-know{background:rgba(74,222,128,.12);color:var(--n5);border-color:rgba(74,222,128,.3);}
.btn-vague{background:rgba(245,158,11,.12);color:var(--n3);border-color:rgba(245,158,11,.3);}
.btn-dunno{background:rgba(248,113,113,.12);color:var(--n2);border-color:rgba(248,113,113,.3);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;}
.empty-icon{font-size:56px;}
.empty-msg{font-size:18px;font-weight:700;}
.empty-sub{font-size:13px;color:var(--text3);}

/* ── PROGRESS BAR (footer) ── */
.prog-bar-wrap{padding:8px 20px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:5px;}
.prog-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex;}

/* ── QUIZ SCREEN ── */
#quiz-screen{background:var(--bg);}
.quiz-body{flex:1;display:flex;flex-direction:column;padding:16px 20px calc(16px + var(--safe-bottom));gap:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
.quiz-prog-wrap{display:flex;align-items:center;gap:10px;}
.quiz-prog-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.quiz-prog-fill{height:100%;background:var(--accent2);border-radius:3px;transition:width .4s ease;}
.quiz-counter{font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap;}
.quiz-kanji-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:30px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 10px 40px rgba(124,106,247,.1);flex-shrink:0;}
.quiz-kanji{font-size:92px;line-height:1;font-weight:300;}
.quiz-q-label{font-size:14px;color:var(--text2);}
.quiz-choices{display:flex;flex-direction:column;gap:10px;}
.choice-btn{padding:15px 18px;border-radius:16px;font-size:15px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .2s;text-align:left;}
.choice-btn:active:not([disabled]){transform:scale(.98);background:var(--surface2);}
.choice-btn.correct{background:rgba(74,222,128,.15);border-color:var(--n5);color:var(--n5);}
.choice-btn.wrong{background:rgba(248,113,113,.15);border-color:var(--n2);color:var(--n2);}
.choice-btn.reveal{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.4);color:var(--n5);}

/* ── KANJI LIST SCREEN ── */
#list-screen{background:var(--bg);}
.list-body{flex:1;display:flex;flex-direction:column;gap:10px;padding:14px 20px calc(14px + var(--safe-bottom));overflow:hidden;min-height:0;}
.list-sub{font-size:13px;color:var(--text2);font-weight:700;}
.kanji-scroll-wrap{flex:1;min-height:0;border:1px solid var(--border);border-radius:18px;background:var(--surface);overflow:hidden;display:flex;flex-direction:column;-webkit-mask-image:-webkit-radial-gradient(#fff,#fff);}
.kanji-list-head{display:grid;grid-template-columns:minmax(52px,.85fr) minmax(88px,1.15fr) minmax(64px,.9fr);column-gap:8px;align-items:center;padding:11px 12px;font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.04em;text-transform:none;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.hk-col{text-align:center;}
.hk-col.hk-mid{text-align:left;}
.hk-col.hk-hira{text-align:left;}
.kanji-list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;touch-action:pan-y;}
.kanji-row{display:grid;grid-template-columns:minmax(52px,.85fr) minmax(88px,1.15fr) minmax(64px,.9fr);column-gap:8px;align-items:center;padding:12px 12px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.kanji-row:last-child{border-bottom:none;}
.kanji-row:active{background:rgba(124,106,247,.08);}
.kr-k{font-size:21px;font-weight:600;line-height:1.2;text-align:center;word-break:keep-all;}
.kr-m{font-size:14px;color:var(--text);font-weight:600;line-height:1.3;word-break:keep-all;}
.kr-h{font-size:15px;color:var(--accent2);font-weight:600;line-height:1.25;word-break:keep-all;font-family:-apple-system,'Hiragino Sans','ヒラギノ角ゴシック','Hiragino Kaku Gothic ProN',sans-serif;}

/* 한자 보기 확대 모달 — 화면 중앙 */
#detail-backdrop.modal-backdrop{align-items:center;justify-content:center;padding:max(14px,var(--safe-top)) 18px max(18px,var(--safe-bottom));}
.detail-sheet{width:min(420px,calc(100vw - 32px));max-height:min(78vh,calc(100dvh - 48px));background:var(--surface);border:1px solid var(--border);border-radius:26px;padding:32px 24px calc(22px + var(--safe-bottom));box-shadow:0 24px 80px rgba(0,0,0,.65);transition:opacity .26s ease,transform .32s cubic-bezier(.34,1.2,.64,1);opacity:0;transform:translateY(12px) scale(.94);}
#detail-backdrop.show .detail-sheet{opacity:1;transform:translateY(0) scale(1);}
.detail-big{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;min-height:140px;margin-bottom:8px;}
#detail-kanji{font-size:min(88px,26vw);line-height:1.05;font-weight:300;letter-spacing:.02em;word-break:keep-all;}
.detail-subline{font-size:18px;font-weight:700;line-height:1.45;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;color:var(--text);}
.detail-subline .d-m{color:var(--text);}
.detail-subline .d-h{font-weight:700;color:var(--accent2);font-family:-apple-system,'Hiragino Sans','ヒラギノ角ゴシック',sans-serif;}
.detail-subline .detail-sep{color:var(--text3);font-weight:800;margin:0 4px;display:inline;}
.detail-sheet .next-btn{margin-top:14px;width:100%;}

/* ── RESULT OVERLAY ── */
.result-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 20px calc(20px + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border);border-radius:24px 24px 0 0;display:flex;flex-direction:column;gap:12px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:50;box-shadow:0 -8px 40px rgba(0,0,0,.6);}
.result-overlay.show{transform:translateY(0);}
.result-status{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;}
.result-icon{font-size:26px;}
.result-answer{font-size:14px;color:var(--text2);line-height:1.6;}
.result-answer strong{color:var(--text);font-weight:700;}
.next-btn{padding:15px;border-radius:14px;font-size:16px;font-weight:700;border:none;background:var(--accent);color:#fff;cursor:pointer;text-align:center;}
.next-btn:active{opacity:.9;transform:scale(.97);}

/* ── QUIZ DONE ── */
.quiz-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;text-align:center;}
.quiz-done-icon{font-size:60px;}
.quiz-done-title{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.quiz-done-stats{display:flex;gap:28px;}
.qds{text-align:center;}
.qds-val{font-size:30px;font-weight:800;}
.qds-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.quiz-done-desc{font-size:14px;color:var(--text2);line-height:1.6;max-width:280px;}
.quiz-done-btn{padding:14px 36px;border-radius:14px;font-size:16px;font-weight:700;border:none;background:var(--accent);color:#fff;cursor:pointer;}
.quiz-done-btn:active{opacity:.9;transform:scale(.98);}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-backdrop.show{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:28px 24px calc(24px + var(--safe-bottom));width:100%;max-width:480px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border);}
.modal-backdrop.show .modal-sheet{transform:translateY(0);}
.modal-icon{font-size:44px;text-align:center;margin-bottom:10px;}
.modal-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:8px;}
.modal-desc{font-size:14px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:14px;}
.modal-warn{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:12px;padding:12px 14px;font-size:13px;color:#f87171;margin-bottom:18px;line-height:1.6;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.modal-confirm{padding:15px;border-radius:14px;font-size:16px;font-weight:700;border:none;background:#f87171;color:#fff;cursor:pointer;}
.modal-confirm:active{opacity:.85;}
.modal-cancel{padding:15px;border-radius:14px;font-size:16px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;}
.modal-cancel:active{opacity:.85;}

@media(hover:none){
  .mode-card:hover,.level-pill:hover,.rate-btn:hover,.nav-btn:hover,.choice-btn:hover,.next-btn:hover{opacity:1;}
}

.kanji-small { font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent2); font-weight: 700; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
.modal-content { background: var(--surface); padding: 2.5rem; border-radius: 2rem; text-align: center; max-width: 90%; width: 400px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.modal-title { font-size: 1.8rem; margin-bottom: 1rem; color: var(--accent2); font-weight: 800; }
.modal-desc { color: var(--text2); margin-bottom: 2rem; line-height: 1.6; }
.modal-btn { background: var(--accent); color: white; border: none; padding: 1rem 2rem; border-radius: 1rem; cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: transform 0.2s; }
.modal-btn:active { transform: scale(0.95); }
.resume-btn { margin-top: 8px; background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div id="home-screen" class="screen">
    <div class="home-header">
        <div class="home-title">JLPT <span>N2</span> 단어장</div>
        
    </div>
    <div class="home-content">
        <div class="stats-card">
            <div class="stats-row">
                <div class="stat-item"><div class="stat-value" id="s-total">0</div><div class="stat-label">전체</div></div>
                <div class="stat-item"><div class="stat-value" id="s-know" style="color:var(--n5)">0</div><div class="stat-label">알아요</div></div>
                <div class="stat-item"><div class="stat-value" id="s-vague" style="color:var(--n3)">0</div><div class="stat-label">애매해요</div></div>
                <div class="stat-item"><div class="stat-value" id="s-dunno" style="color:var(--n2)">0</div><div class="stat-label">몰라요</div></div>
            </div>
            <div class="progress-bar">
                <div class="prog-know" id="pg-know" style="width:0%"></div>
                <div class="prog-vague" id="pg-vague" style="width:0%"></div>
                <div class="prog-dunno" id="pg-dunno" style="width:0%"></div>
            </div>
        </div>

        <div class="level-section">
            <div class="section-label">JLPT 급수</div>
            <div class="level-pills" id="level-pills"></div>
        </div>

        <div class="mode-section">
            <div class="section-label">학습 모드</div>
            <div class="mode-list">
                <div class="mode-card" onclick="startMode('all')">
                    <div class="mode-icon">📚</div>
                    <div class="mode-info"><div class="mode-name">전체 학습</div><div class="mode-desc">선택한 급수 전체 단어</div></div>
                    <div class="mode-count" id="mc-all">0</div>
                    <div class="mode-arrow">›</div>
                </div>
                <div class="mode-card" onclick="startMode('dunno')">
                    <div class="mode-icon">❌</div>

    // Typical: "뜻 (かな)" -> "뜻"
    const beforeParen = raw.split('(')[0];
    return beforeParen.trim().replace(/\s+/g, ' ');
}

/** "뜻 (かな)" 형식 문자열 분리 → 한자 보기·카드 뒷면 (뜻 히라가나) 표기용 */
function parseJaDesc(description) {
    const raw = (description != null ? String(description) : '').trim();
    const idx = raw.lastIndexOf('(');
    const end = raw.lastIndexOf(')');
    if (idx >= 0 && end > idx) {
        const meaning = raw.slice(0, idx).trim();
        const reading = raw.slice(idx + 1, end).trim();
        return { meaning, reading };
    }
    return { meaning: raw, reading: '' };
}

function detailMetaLine(description) {
    const { meaning, reading } = parseJaDesc(description);
    if (meaning && reading) return '(' + meaning + ' ' + reading + ')';
    if (meaning) return '(' + meaning + ')';
    return '(—)';
}

function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function flashBackLine(description) {
    const ln = detailMetaLine(description);
    return ln !== '(—)' ? ln : parseJaDesc(description).meaning || '';
}

function loadScores() {
    const saved = localStorage.getItem('jlpt_scores');
    if (saved) scores = JSON.parse(saved);
}

function saveScores() {
    localStorage.setItem('jlpt_scores', JSON.stringify(scores));
    updateStats();
}

function setLevel(lvl) {
    currentLevel = lvl;
    updateStats();
}

function viewLevel(lvl) {
    setLevel(lvl);
    openKanjiList(lvl);
}

function viewCurrentLevel() {
    if (currentLevel === 'ALL') return alert('JLPT 급수를 먼저 선택해주세요! (N5~N2)');
    viewLevel(currentLevel);
}

function resetCurrentLevel() {
    if (currentLevel === 'ALL') return alert('JLPT 급수를 먼저 선택해주세요! (N5~N2)');
    resetLevel(currentLevel);
}

function resetLevel(lvl) {
    if(!confirm(lvl + ' 데이터만 초기화할까요?')) return;
    const saved = localStorage.getItem('jlpt_scores');
    if (!saved) return;
    let parsed;
    try { parsed = JSON.parse(saved) || {}; }
    catch { parsed = {}; }

    const levelIds = new Set(ALL_DATA.filter(d => d.jlpt === lvl).map(d => String(d.id)));
    Object.keys(parsed).forEach(k => {
        if (levelIds.has(String(k))) delete parsed[k];
    });
    localStorage.setItem('jlpt_scores', JSON.stringify(parsed));
    scores = parsed;
    updateStats();
}

function resetAllScores() {
    if(!confirm('전체 기록을 초기화할까요?')) return;
    localStorage.removeItem('jlpt_scores');
    scores = {};
    updateStats();
}

function openKanjiList(lvl) {
    const base = lvl === 'ALL' ? ALL_DATA : ALL_DATA.filter(d => d.jlpt === lvl);
    currentList = [...base].sort((a, b) => (a.id || 0) - (b.id || 0));
    currentIndex = 0;

    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('flash-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('list-screen').classList.remove('hidden');

    const tag = document.getElementById('list-level-tag');
    if (tag) tag.textContent = '(' + lvl + ')';
    const sub = document.getElementById('list-sub');
    if (sub) sub.textContent = `${base.length}단어`;

    renderKanjiGrid();
}

function renderKanjiGrid() {
    const grid = document.getElementById('kanji-grid');
    if (!grid) return;
    grid.innerHTML = currentList.map((item, idx) => {
        const { meaning, reading } = parseJaDesc(item.description);
        const m = meaning || '—';
        const h = reading || '—';
        return '<div class="kanji-row" role="button" tabindex="0" onclick="openDetail(' + idx + ')">' +
            '<div class="kr-k">' + escHtml(item.kanji) + '</div>' +
            '<div class="kr-m">' + escHtml(m) + '</div>' +
            '<div class="kr-h">' + escHtml(h) + '</div>' +
            '</div>';
    }).join('');
}

function openDetail(idx) {
    const item = currentList[idx];
    if (!item) return;
    const k = document.getElementById('detail-kanji');
    const meanEl = document.getElementById('detail-mean');
    const readEl = document.getElementById('detail-read');
    const sepEl = document.getElementById('detail-sep');
    const { meaning, reading } = parseJaDesc(item.description);
    if (k) k.textContent = item.kanji;
    if (meanEl) meanEl.textContent = meaning || '—';
    if (readEl) readEl.textContent = reading || '';
    if (sepEl) {
        sepEl.hidden = !(meaning && reading);
    }
    document.getElementById('detail-backdrop').classList.add('show');
}

function closeDetail(evt) {
    if (evt && evt.target && evt.target.closest && evt.target.closest('.detail-sheet')) return;
    document.getElementById('detail-backdrop').classList.remove('show');
}

function updateStats() {
    const filtered = currentLevel === 'ALL' ? ALL_DATA : ALL_DATA.filter(d => d.jlpt === currentLevel);
    const counts = { total: filtered.length, know: 0, vague: 0, dunno: 0 };
    filtered.forEach(d => {
        if (scores[d.id]) counts[scores[d.id]]++;
    });
    
    document.getElementById('s-total').textContent = counts.total;
    document.getElementById('s-know').textContent = counts.know;
    document.getElementById('s-vague').textContent = counts.vague;
    document.getElementById('s-dunno').textContent = counts.dunno;
    
    const getPct = (v) => (v / counts.total * 100) || 0;
    document.getElementById('pg-know').style.width = getPct(counts.know) + '%';
    document.getElementById('pg-vague').style.width = getPct(counts.vague) + '%';
    document.getElementById('pg-dunno').style.width = getPct(counts.dunno) + '%';
    
    const setText = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.textContent = String(val);
    };
    setText('mc-know', counts.know);
    setText('mc-all', counts.total);
    setText('mc-dunno', counts.dunno);
    setText('mc-vague', counts.vague);
    
    const viewBtn = document.getElementById('btn-view-level');
    const resetBtn = document.getElementById('btn-reset-level');
    const resetAllBtn = document.getElementById('btn-reset-all');
    const isAll = currentLevel === 'ALL';
    if (viewBtn) {
        viewBtn.textContent = isAll ? '한자 보기' : `${currentLevel} 한자 보기`;
        viewBtn.style.display = isAll ? 'none' : '';
    }
    if (resetBtn) {
        resetBtn.textContent = isAll ? '기록 초기화' : `${currentLevel} 기록 초기화`;
        resetBtn.style.display = isAll ? 'none' : '';
    }
    if (resetAllBtn) {
        resetAllBtn.style.display = isAll ? '' : 'none';
    }

    renderLevelPills();
}

function renderLevelPills() {
    const lvls = ['ALL', 'N5', 'N4', 'N3', 'N2'];
    const container = document.getElementById('level-pills');
    if (container) {
        container.innerHTML = lvls.map(l => 
            `<div class="level-pill ${l === currentLevel ? 'active-' + l : ''}" onclick="setLevel('${l}')">${l === 'ALL' ? '전체' : l}</div>`
        ).join('');
    }
}

function startMode(mode) {
    let base = currentLevel === 'ALL' ? ALL_DATA : ALL_DATA.filter(d => d.jlpt === currentLevel);
    if (mode === 'dunno') base = base.filter(d => scores[d.id] === 'dunno');
    if (mode === 'vague') base = base.filter(d => scores[d.id] === 'vague');
    
    if (base.length === 0) return alert('단어가 없습니다!');

    currentList = [...base].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('flash-screen').classList.remove('hidden');
    document.getElementById('flash-level-tag').textContent = '(' + currentLevel + ')';
    renderCard();
}

function renderCard() {
    const item = currentList[currentIndex];
    const fc = document.getElementById('flashcard');
    fc.classList.add('no-flip-anim');
    fc.classList.remove('flipped');
    
    document.getElementById('cf-kanji').textContent = item.kanji;
    document.getElementById('cb-kanji').textContent = item.kanji;
    document.getElementById('cb-desc').textContent = flashBackLine(item.description);
    
    const badges = ['cf-badge', 'cb-badge'];
    badges.forEach(id => {
        const el = document.getElementById(id);
        el.textContent = item.jlpt;
        el.style.background = 'rgba(255,255,255,0.1)';
        el.style.color = 'var(--' + item.jlpt.toLowerCase() + ')';
        el.style.border = '1px solid var(--' + item.jlpt.toLowerCase() + ')';
    });
    
    document.getElementById('card-counter').textContent = (currentIndex + 1) + ' / ' + currentList.length;
    updateFlashGauge();

    fc.offsetHeight;
    requestAnimationFrame(() => fc.classList.remove('no-flip-anim'));
}

function flipCard() {
    document.getElementById('flashcard').classList.toggle('flipped');
}

function rate(type) {
    scores[currentList[currentIndex].id] = type;
    saveScores();
    
    if (currentIndex < currentList.length - 1) {
        currentIndex++;
        renderCard();
    } else {
        showModal();
    }
}

function nextCard() {
    if (currentIndex < currentList.length - 1) { currentIndex++; renderCard(); }
}

function prevCard() {
    if (currentIndex > 0) { currentIndex--; renderCard(); }
}

function updateFlashGauge() {
    let k=0, v=0, d=0;
    currentList.forEach(item => {
        if (scores[item.id] === 'know') k++;
        else if (scores[item.id] === 'vague') v++;
        else if (scores[item.id] === 'dunno') d++;
    });
    document.getElementById('fl-know').textContent = k;
    document.getElementById('fl-vague').textContent = v;
    document.getElementById('fl-dunno').textContent = d;
    
    const getPct = (v) => (v / currentList.length * 100) || 0;
    document.getElementById('fp-know').style.width = getPct(k) + '%';
    document.getElementById('fp-vague').style.width = getPct(v) + '%';
    document.getElementById('fp-dunno').style.width = getPct(d) + '%';
}

function startQuiz() {
    let base = currentLevel === 'ALL' ? ALL_DATA : ALL_DATA.filter(d => d.jlpt === currentLevel);
    base = base.filter(d => scores[d.id] === 'know');
    
    if (base.length < 4) return alert('퀴즈를 진행하려면 최소 4개의 "알아요" 단어가 필요합니다!');
    
    currentList = [...base].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    quizCorrect = 0;
    
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    renderQuiz();
}

function renderQuiz() {
    const item = currentList[currentIndex];
    document.getElementById('q-kanji').textContent = item.kanji;
    document.getElementById('q-badge').textContent = item.jlpt;
    document.getElementById('q-badge').style.color = 'var(--' + item.jlpt.toLowerCase() + ')';
    document.getElementById('q-badge').style.border = '1px solid var(--' + item.jlpt.toLowerCase() + ')';
    document.getElementById('quiz-counter').textContent = (currentIndex + 1) + ' / ' + currentList.length;
    
    const correctDesc = quizDesc(item);
    let others = ALL_DATA.filter(d => quizDesc(d) !== correctDesc);
    let choices = [item];
    let usedDescs = new Set([correctDesc]);
    
    while(choices.length < 4 && others.length > 0) {
        let idx = Math.floor(Math.random() * others.length);
        let rand = others[idx];
        const randDesc = quizDesc(rand);
        if(!usedDescs.has(randDesc)) {
            choices.push(rand);
            usedDescs.add(randDesc);
        }
        others.splice(idx, 1);
    }
    choices.sort(() => Math.random() - 0.5);
    
    const container = document.getElementById('quiz-choices');
    container.innerHTML = choices.map(c => {
        return `<button class="choice-btn" onclick="checkAnswer(${c.id === item.id}, this)">${quizDesc(c)}</button>`;
    }).join('');
}

function checkAnswer(isCorrect, btn) {
    const item = currentList[currentIndex];
    const overlay = document.getElementById('result-overlay');
    const status = document.getElementById('result-status');
    const msg = document.getElementById('result-msg');
    
    if(isCorrect) {
        btn.classList.add('correct');
        status.textContent = '⭕';
        msg.textContent = '정답입니다!';
        quizCorrect++;
    } else {
        btn.classList.add('wrong');
        status.textContent = '❌';
        msg.textContent = '틀렸습니다! 정답: ' + quizDesc(item);
        scores[item.id] = 'vague';
        saveScores();
    }
    overlay.classList.add('show');
}

function nextQuiz() {
    document.getElementById('result-overlay').classList.remove('show');
    if (currentIndex < currentList.length - 1) {
        currentIndex++;
        renderQuiz();
    } else {
        showModal();
    }
}

function showModal() {
    const msg = document.getElementById('quiz-screen').classList.contains('hidden') 
        ? currentLevel + ' 학습을 완료했습니다!'
        : `퀴즈 완료! 정답률: ${Math.round(quizCorrect/currentList.length*100)}% (${quizCorrect}/${currentList.length})`;
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-backdrop').classList.add('show');
}

function goHome() {
    document.getElementById('modal-backdrop').classList.remove('show');
    document.getElementById('detail-backdrop').classList.remove('show');
    document.getElementById('flash-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('list-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.remove('hidden');
    updateStats();
}

window.onload = () => {
    loadScores();
    setLevel('ALL');
};
</script>
